# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 80
  cpu: 1
env:
  - variable: SITE_URL
    value: https://civiclens.codingliquids.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SITE_URL
    value: https://civiclens.codingliquids.com
    availability:
      - BUILD
      - RUNTIME

  - variable: CONTACT_URL
    value: https://sagnikbhattacharya.com/contact
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CONTACT_URL
    value: https://sagnikbhattacharya.com/contact
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: civiclens-bexm4.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: ADMIN_USERNAME
    secret: ADMIN_USERNAME

  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
